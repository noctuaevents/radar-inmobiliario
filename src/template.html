  <form name="pro-waitlist" data-netlify="true" netlify hidden>
    <input type="email" name="email" />
  </form>

  <div id="root"></div>

  <!-- Data (plain JS, attaches to window) -->
  <script src="ec206f8e-91e9-4af6-b241-2e2e3b3d7e86"></script>
  <script src="ce58f2fe-10fa-44cc-b058-c70ea3d8752f"></script>
  <script src="55a16de2-5209-4fdf-974f-52d9b6215245"></script>
  <script src="f45176d5-c2b4-4168-bd92-c9c93c52909b"></script>
  <script src="82f7fa11-ad7b-4311-af99-09a6eb97bd7e"></script>

  <!-- Shared map / formatter components -->
  <script type="text/babel" src="3884227a-631f-472b-aec7-1747509f7566"></script>

  <!-- Monetization (must load before pages/router that reference window.showProModal, hasPro, etc.) -->
  <script type="text/babel" src="a8dc2ce3-2776-42dc-9647-6dbb40cb9dd8"></script>
  <script type="text/babel" src="647df7e0-e276-40aa-9acc-70e0f5260794"></script>

  <!-- Pages -->
  <script type="text/babel" src="eb5a07ad-e34a-408f-973b-61cc134b0290"></script>
  <script type="text/babel" src="bb081ba2-5f91-41ed-9b3b-1d89da38685e"></script>
  <script type="text/babel" src="e9187d32-c781-47ae-9388-ec8e90db394c"></script>
  <script type="text/babel" src="a18d8a5f-3a78-42bd-a79d-28ef0aa77b4d"></script>
  <script type="text/babel" src="896a3eea-9796-4c37-b6bc-f60af15aa35f"></script>

  <!-- Router -->
  <script type="text/babel">
    const { useState: useRouteState, useEffect: useRouteEffect } = React;

    window.navTo = (path) => { window.location.hash = path; };

    function route() {
      const h = window.location.hash.replace(/^#/, '');
      return h || '/';
    }

    function SiteNav({ active }) {
      const link = (key, label, path) => (
        <span
          onClick={() => window.navTo(path)}
          className={`cursor-pointer transition-colors ${active === key ? 'text-emerald-700 font-semibold' : 'text-slate-600 hover:text-emerald-700'}`}
        >
          {label}
        </span>
      );
      return (
        <header className="bg-white border-b border-slate-200 sticky top-0 z-50 backdrop-blur-sm">
          <div className="max-w-6xl mx-auto px-8 h-14 flex items-center justify-between">
            <div
              className="flex items-center gap-2 font-bold text-slate-900 text-sm cursor-pointer"
              onClick={() => window.navTo('/')}
            >
              <span className="text-emerald-600 text-xl leading-none">●</span>
              <span>Radar Inmobiliario</span>
              <span className="text-emerald-600">Madrid</span>
            </div>
            <nav className="flex items-center gap-6 text-sm" style={{ overflowX: 'auto', whiteSpace: 'nowrap', scrollbarWidth: 'none', msOverflowStyle: 'none', minWidth: 0 }}>
              {link('home', 'Inicio', '/')}
              {link('distritos', 'Distritos', '/distritos')}
              {link('noticias', 'Noticias', '/noticias')}
              {link('sobre', 'Sobre', '/sobre')}
              <span className="text-slate-600 hover:text-emerald-700 cursor-pointer" onClick={() => window.showProModal("Comparador de distritos")}>Comparar</span>
              <span className="text-slate-600 hover:text-emerald-700 cursor-pointer" onClick={() => window.showProModal("Rankings de barrios")}>Rankings</span>
              <span className="bg-emerald-600 text-white px-3 py-1.5 rounded-md cursor-pointer hover:bg-emerald-500">Newsletter</span>
            </nav>
          </div>
        </header>
      );
    }

    
    /* ---- F-07: PricingPage ---- */
    function PricingPage() {
      const free = ['Portada y análisis mensual','21 distritos de Madrid','Noticias curadas del sector','Cartograma de precios'];
      const proDisponible = ['Comparador de distritos','Simulador de hipoteca avanzado','Exportación CSV'];
      const proEnCamino = ['131 barrios con datos detallados','Histórico 24 meses por distrito','Alertas de barrio por email'];
      const founder = (window.RADAR_CONFIG && window.RADAR_CONFIG.founder) || { yearlyPrice: 49, normalYearly: 79, monthly: 9, seats: 100 };
      const stripeCfg = (window.RADAR_CONFIG && window.RADAR_CONFIG.stripe) || {};
      const hasStripeLink = !!(stripeCfg.yearlyFounder || stripeCfg.monthly);

      const [waitlistEmail, setWaitlistEmail] = React.useState('');
      const [waitlistStatus, setWaitlistStatus] = React.useState('idle'); // idle | loading | ok | error

      function encodeForm(data) {
        return Object.keys(data).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(data[k])).join('&');
      }

      function handleWaitlistSubmit() {
        const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(waitlistEmail.trim());
        if (!valid) { setWaitlistStatus('error'); return; }
        setWaitlistStatus('loading');
        fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: encodeForm({ 'form-name': 'pro-waitlist', email: waitlistEmail.trim() }),
        })
          .then((r) => { setWaitlistStatus(r.ok ? 'ok' : 'error'); })
          .catch(() => { setWaitlistStatus('error'); });
      }

      function handleHazteProClick() {
        if (stripeCfg.yearlyFounder) { window.location.href = stripeCfg.yearlyFounder; return; }
        if (stripeCfg.monthly) { window.location.href = stripeCfg.monthly; return; }
        const el = document.getElementById('waitlist-form');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      return (
        <div className="min-h-screen bg-slate-50">
          <SiteNav active="pro" />
          <div className="max-w-4xl mx-auto px-6 py-16">
            <div className="text-center mb-14">
              <h1 className="text-4xl font-bold text-slate-900 mb-4">Elige tu plan</h1>
              <p className="text-lg text-slate-500">Datos del mercado inmobiliario de Madrid, sin filtros ni patrocinios.</p>
            </div>
            <div className="grid md:grid-cols-2 gap-6">
              <div className="bg-white rounded-2xl border border-slate-200 p-8">
                <div className="text-sm font-semibold text-slate-500 uppercase tracking-wide mb-3">Gratis</div>
                <div className="text-4xl font-bold text-slate-900 mb-1">0€</div>
                <div className="text-slate-400 text-sm mb-8">Para siempre</div>
                <ul className="space-y-3 mb-8">
                  {free.map((f,i) => (
                    <li key={i} className="flex items-start gap-3 text-sm text-slate-600">
                      <span className="text-emerald-500 mt-0.5 shrink-0">✓</span>{f}
                    </li>
                  ))}
                </ul>
                <button onClick={() => window.navTo('/')} className="w-full py-3 border border-slate-200 rounded-xl text-slate-600 text-sm font-medium hover:bg-slate-50 transition-colors">Ir al inicio</button>
              </div>
              <div className="bg-emerald-600 rounded-2xl p-8 text-white relative overflow-hidden">
                <div className="absolute top-4 right-4 bg-white/20 text-white text-xs font-semibold px-2.5 py-1 rounded-full">Precio fundador</div>
                <div className="text-sm font-semibold text-emerald-100 uppercase tracking-wide mb-3">Pro</div>
                <div className="flex items-baseline gap-2 mb-1">
                  <span className="text-4xl font-bold">{founder.yearlyPrice}€<span className="text-xl font-normal text-emerald-200">/año</span></span>
                  <span className="text-emerald-200 text-lg" style={{ textDecoration: 'line-through' }}>{founder.normalYearly}€</span>
                </div>
                <div className="text-emerald-200 text-sm mb-1">o {founder.monthly}€/mes</div>
                <div className="text-emerald-100 text-xs font-semibold mb-8">Precio fundador — primeros {founder.seats} suscriptores, para siempre</div>
                <p className="text-emerald-100 text-[11px] uppercase tracking-[0.15em] font-bold mb-2">Disponible ya</p>
                <ul className="space-y-2.5 mb-5">
                  {proDisponible.map((p,i) => (
                    <li key={i} className="flex items-start gap-3 text-sm text-white">
                      <span className="text-emerald-200 mt-0.5 shrink-0">✓</span>{p}
                    </li>
                  ))}
                </ul>
                <p className="text-emerald-100 text-[11px] uppercase tracking-[0.15em] font-bold mb-2">En camino, incluido</p>
                <ul className="space-y-2.5 mb-8">
                  {proEnCamino.map((p,i) => (
                    <li key={i} className="flex items-start gap-3 text-sm text-emerald-50">
                      <span className="text-emerald-200 mt-0.5 shrink-0">○</span>{p}
                    </li>
                  ))}
                </ul>
                <button onClick={handleHazteProClick} className="w-full py-3 bg-white text-emerald-700 rounded-xl text-sm font-bold hover:bg-emerald-50 transition-colors">Hazte Pro →</button>
              </div>
            </div>

            {!hasStripeLink && (
              <div id="waitlist-form" className="mt-10 bg-white border border-slate-200 rounded-2xl p-6 max-w-md mx-auto text-center">
                <p className="text-sm font-bold text-slate-900 mb-1">Lista de espera fundador</p>
                <p className="text-xs text-slate-500 mb-4 leading-relaxed">El pago con tarjeta llega pronto. Deja tu email y serás de los primeros {founder.seats} en recibir tu código de acceso al precio fundador.</p>
                {waitlistStatus === 'ok' ? (
                  <p className="text-emerald-700 font-semibold text-sm py-2">¡Apuntado! Te avisaremos en cuanto abramos los pagos.</p>
                ) : (
                  <>
                    <div className="flex gap-2 mb-2">
                      <input
                        className={`flex-1 bg-white border text-slate-900 placeholder-slate-400 rounded-lg px-4 py-2.5 text-sm focus:ring-1 outline-none ${waitlistStatus === 'error' ? 'border-rose-200 focus:border-rose-200 focus:ring-rose-200' : 'border-slate-300 focus:border-emerald-500 focus:ring-emerald-500'}`}
                        placeholder="tu@email.com"
                        type="email"
                        value={waitlistEmail}
                        onChange={(e) => { setWaitlistEmail(e.target.value); if (waitlistStatus === 'error') setWaitlistStatus('idle'); }}
                        onKeyDown={(e) => e.key === 'Enter' && handleWaitlistSubmit()}
                      />
                      <button
                        onClick={handleWaitlistSubmit}
                        disabled={waitlistStatus === 'loading'}
                        className="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-60 text-white font-bold px-5 py-2.5 rounded-lg text-sm whitespace-nowrap transition-opacity"
                      >
                        {waitlistStatus === 'loading' ? '…' : 'Apuntarme'}
                      </button>
                    </div>
                    {waitlistStatus === 'error' && (
                      <p className="text-rose-600 text-xs">Introduce un email válido.</p>
                    )}
                  </>
                )}
              </div>
            )}

            <div className="mt-16">
              <h2 className="text-xl font-bold text-slate-900 mb-6 text-center">Preguntas frecuentes</h2>
              <div className="space-y-4 max-w-2xl mx-auto">
                {[
                  ['¿Cuándo se actualizan los datos?','Mensualmente, con datos de cierre del mes anterior.'],
                  ['¿Puedo cancelar cuando quiera?','Sí, sin compromiso de permanencia.'],
                  ['¿Qué son los 131 barrios?','Madrid se divide en 21 distritos y 131 barrios. El plan Pro incluye datos detallados a nivel de barrio.'],
                  ['¿Cómo pago?','Tarjeta de crédito o débito vía Stripe. Mientras activamos los pagos, apúntate a la lista de espera y te avisamos por email en cuanto esté disponible.'],
                  ['¿Qué es el precio fundador?','Los primeros ' + founder.seats + ' suscriptores de Radar Pro pagan ' + founder.yearlyPrice + '€/año en lugar de ' + founder.normalYearly + '€/año, para siempre mientras mantengan la suscripción activa.'],
                ].map(([q,a],i) => (
                  <div key={i} className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="font-semibold text-slate-900 text-sm mb-1.5">{q}</div>
                    <div className="text-slate-500 text-sm">{a}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ---- F-08: AboutPage ---- */
    function AboutPage() {
      return (
        <div className="min-h-screen bg-slate-50">
          <SiteNav active="sobre" />
          <div className="max-w-2xl mx-auto px-6 py-16">
            <h1 className="text-4xl font-bold text-slate-900 mb-3">Sobre el Radar</h1>
            <p className="text-emerald-600 font-medium mb-10">Sin recomendaciones. Sin patrocinios. Solo el precio, el cambio y el porqué.</p>
            <div className="prose prose-slate space-y-6 text-slate-600 text-base leading-relaxed">
              <p>Radar Inmobiliario Madrid nació de una frustración: toda la información sobre el mercado de la vivienda en Madrid llega envuelta en interés. Las agencias quieren que compres, los medios dependen de la publicidad inmobiliaria y los portales tienen sus propios rankings.</p>
              <p>Este proyecto es una publicación de datos independiente. Cada mes recogemos y analizamos los números de los 21 distritos y los 131 barrios de Madrid: precio medio en €/m², rentabilidad bruta estimada, variación anual y volumen de transacciones.</p>
              <h2 className="text-xl font-bold text-slate-900 mt-10 mb-3">Metodología</h2>
              <p>Los datos de precio provienen de fuentes públicas (Ministerio de Transportes, Movilidad y Agenda Urbana — MITMA) y registros de transacciones. La rentabilidad se calcula como el cociente entre el precio de alquiler medio de mercado y el precio de compra por distrito, antes de gastos e impuestos.</p>
              <p>Las noticias se seleccionan manualmente por su impacto demostrable en los precios del entorno. No cubrimos inauguraciones de centros comerciales ni declaraciones de intenciones sin datos detrás.</p>
              <h2 className="text-xl font-bold text-slate-900 mt-10 mb-3">Modelo de negocio</h2>
              <p>La portada, los 21 distritos y las noticias son gratuitos. El plan Pro (9€/mes) financia los 131 barrios, el histórico de datos y las herramientas de análisis. Sin publicidad. Sin afiliados.</p>
            </div>
            <div className="mt-12 pt-8 border-t border-slate-200">
              <button onClick={() => window.navTo('/')} className="text-emerald-600 text-sm font-medium hover:text-emerald-700">← Volver al inicio</button>
            </div>
          </div>
        </div>
      );
    }

    /* ---- F-09: NotFoundPage ---- */
    function NotFoundPage() {
      return (
        <div className="min-h-screen bg-slate-50 flex items-center justify-center px-6">
          <div className="text-center max-w-sm">
            <div className="text-emerald-600 text-6xl font-bold mb-4">404</div>
            <h1 className="text-2xl font-bold text-slate-900 mb-3">Página no encontrada</h1>
            <p className="text-slate-500 mb-8">Esta URL no existe. Puede que el enlace esté roto o que la página haya cambiado.</p>
            <button onClick={() => window.navTo('/')} className="bg-emerald-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-emerald-500 transition-colors">Volver al inicio</button>
          </div>
        </div>
      );
    }

function App() {
      const [r, setR] = useRouteState(route());
      useRouteEffect(() => {
        const onHash = () => { setR(route()); window.scrollTo(0, 0); };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      if (r.startsWith('/distritos/')) { const slug = r.slice(11); return (<div><SiteNav active="distritos" /><window.DistritoDetalle slug={slug} /></div>); }
      if (r === '/herramientas/simulador') return (<div><SiteNav active="" /><window.SimuladorHipoteca /></div>);
      if (r === '/herramientas/comparador') return (<div><SiteNav active="" /><window.ComparadorDistritos /></div>);
      if (r === '/gracias') return (<div><SiteNav active="" /><window.GraciasPage /></div>);
      if (r === '/distritos') return (<div><SiteNav active="distritos" /><window.DistritosV2 /></div>);
      if (r === '/noticias')  return (<div><SiteNav active="noticias" /><window.NewsV2 /></div>);
      if (r.startsWith('/noticia/')) { const slug = r.slice(9); return (<div><SiteNav active="noticias" /><window.NoticiaDetalleDynamic slug={slug} /></div>); }
      if (r === '/noticia')   return (<div><SiteNav active="noticias" /><window.NoticiaDetalleV3 /></div>);
      if (r === '/metodologia') return (<div><SiteNav active="" /><window.MetodologiaPage /></div>);
      if (r === '/legal')     return (<div><SiteNav active="" /><window.LegalPage /></div>);
      if (r === '/pro')       return (<PricingPage />);
      if (r === '/sobre')     return (<AboutPage />);
      if (r === '/')          return (<window.VariationD />);
      return (<NotFoundPage />);
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>


</body></html>
